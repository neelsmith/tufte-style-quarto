project:
  type: book
date: today
date-format: "long"
version: "1.0.0"

book:
  title: "A Quarto book project with Tufte-style layout"
  author: "Neel Smith"

  page-footer:
    left: "© 2026 Neel Smith"
    right: "Version **{{< meta version >}}**,  {{< meta date >}}"

  chapters:
    - index.qmd
    - intro.qmd
    - config-tech.qmd
    - references.qmd
    - releases.qmd

bibliography: references.bib
link-citations: true 

format:
  html:
    theme: cosmo
    css: custom.css
    toc: true
    page-layout: article
    
  pdf:
    pdf-engine: lualatex  
    toc: true
    number-sections: true
 
    # Precise Tufte-style layout math for LaTeX.
    geometry:
      - top=2.5cm
      - bottom=2.5cm
      - left=2.5cm
      - right=5cm          # Outer page boundary edge
      - marginparwidth=3.5cm  # Widens the actual container for the notes
      - marginparsep=0.5cm   # The buffer gap between body text and side notes
      
    colorlinks: true

    # Use Georgia as  the main font for the document, with a fallback to an emoji font for emoji characters.
    fontsize: 11pt    
    mainfont: "Georgia"
    include-in-header:
      - text: |
          \usepackage{hyperref}
          \hypersetup{
            colorlinks=true,
            linkcolor=[rgb]{0.10,0.37,0.70},
            citecolor=[rgb]{0.10,0.37,0.70},
            urlcolor=[rgb]{0.10,0.37,0.70}
          }
          \usepackage{fontspec}
          \usepackage{luacode}
          
          % Define a fallback chain with a popular system emoji font
          \directlua{
            luaotfload.add_fallback("emojifallback", {
              "Apple Color Emoji:mode=harf;"
            })
          }
          
          % Bind Georgia to the fallback chain
          \setmainfont{Georgia}[RawFeature={fallback=emojifallback}]