project:
  type: book

book:
  title: "Quarto Tufte-Style Demo"
  author: "Jane Doe"
  date: "2026-07-10"
  chapters:
    - index.qmd
    - intro.qmd
    - references.qmd

bibliography: references.bib
# The core Markdown flag that explicitly forces in-text citations to become hyperlinks
link-citations: true 

format:
  html:
    theme: cosmo
    css: custom.css
    toc: true
    page-layout: article
    
  typst:
    toc: true
    # Tells Quarto to use Pandoc's core citation engine instead of the raw Typst parser
    citeproc: true 
    mainfont: "Libertinus Serif"
    fontsize: 11pt
    section-numbering: "1.1"
    # Strips out the default "orange-book" colors and blue blocks natively
    brand:
      color:
        primary: "#000000" 
    # Sets up your elegant, wide right margin for Tufte-style side commentary
    margin:
      top: 2.5cm
      bottom: 2.5cm
      left: 2.5cm
      right: 5cm
    include-before-body:
      - text: |
          // Keeps your active citation hyperlinks styled in a readable, quiet blue
          #show link: set text(fill: rgb("#1a5fb4"))